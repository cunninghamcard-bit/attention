name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # mise is the single toolchain entry (node/pnpm/go pins from mise.toml);
      # CI runs the same gate as every local machine — no hand-copied step
      # list to drift (this file previously called typecheck:server and
      # build:server, scripts that never existed in this tree).
      - uses: jdx/mise-action@v2
      - run: pnpm install --frozen-lockfile
        env:
          CI: "true"
      - run: mise run gate
      - run: pnpm run build
      - run: pnpm run build:electron
      # Not here yet (documented follow-up): the electron e2e / perf
      # harness (needs xvfb + a display) — stays local-only for now.
