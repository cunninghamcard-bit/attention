name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # The kernel-history wall follows the merged kernel commits; a
          # shallow clone makes them unreachable and the wall reds.
          fetch-depth: 0
      # mise is the single toolchain entry (node/pnpm/go pins from mise.toml);
      # CI runs the same gate as every local machine — no hand-copied step
      # list to drift (this file previously called typecheck:server and
      # build:server, scripts that never existed in this tree).
      - uses: jdx/mise-action@v2
      - run: mise run setup
        env:
          CI: "true"
      - run: mise run lint
      - run: mise run typecheck
      # The runner exports a real GITHUB_TOKEN; the service's env fallback
      # would pick it up and the refuses-without-a-token test could never
      # refuse. Tests run token-hermetic.
      - run: mise run test
        env:
          GITHUB_TOKEN: ""
      - run: mise run test:go
      - run: mise run packcheck
      - run: mise run web:build
      - run: mise run desktop:build
      # Not here yet (documented follow-up): the electron e2e / perf
      # harness (needs xvfb + a display) — stays local-only for now.
