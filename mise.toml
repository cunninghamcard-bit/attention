# Toolchain control (owner's three layers): mise pins tool versions and is the
# task entry point, bun executes commands, pnpm alone manages dependencies and
# the workspace. New machine: `mise install && mise run gate`.

[tools]
node = "26.3.0"
pnpm = "11.7.0"
bun = "1.3.14"

[tasks.install]
description = "Install dependencies — pnpm only (a preinstall hook enforces it)"
run = "pnpm install --frozen-lockfile"

[tasks.dev]
description = "Vite dev server at http://127.0.0.1:5173"
run = "bun run dev"

[tasks.test]
description = "Full vitest suite"
run = "bun run test"

[tasks.e2e]
description = "Playwright end-to-end tests (web)"
run = "bun run e2e"

[tasks.desktop]
description = "Build + launch the Electron app"
run = "bun run desktop"

[tasks.format]
description = "Rewrite formatting (oxfmt)"
run = "bun run format"

[tasks.lint]
run = "bun run lint"

[tasks.typecheck]
run = "bun run typecheck"

[tasks.gate]
description = "The review gate, in one command. Non-mutating: format is checked, not rewritten. Its output is the delivery receipt."
run = [
  "bun run format:check",
  "bun run lint",
  "bun run typecheck",
  "bun run test",
]
