packages:
  # The monorepo lanes: the desktop shell and the web product under apps/, the
  # shared contracts and the sdk seat under packages/, plus the centralized
  # test lane. The Go kernel at the repo root is NOT a workspace member.
  - apps/*
  - packages/*
  - tests

# @pierre/diffs exposes a vanilla core but declares React as a peer for its
# optional wrapper. The product uses only the core, so do not install peers.
autoInstallPeers: false

supportedArchitectures:
  os:
    - current
  cpu:
    - current

# electron 43+ has no install scripts (its binary self-downloads on first
# run); node-pty's postinstall arranges its prebuilds.
allowBuilds:
  # pure-JS SDK, no native build needed
  "@google/genai": false
  electron: false
  node-pty: true
  # postinstall only stamps version files
  protobufjs: false

patchedDependencies:
  ghostty-web: patches/ghostty-web.patch
